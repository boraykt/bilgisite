<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Günlük İlginç Bilgi</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  color:#333;
}
header{
  text-align:center;
  padding:40px;
  color:white;
}
main{
  max-width:900px;
  margin:30px auto;
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
}
button{
  padding:10px 18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  margin:5px;
}
#login button{
  background:#4285F4;
  color:white;
}
#answers button{
  display:block;
  width:100%;
  margin:8px 0;
  background:#f1f1f1;
}
#answers button:hover{
  background:#ddd;
}
#leaderboard{
  margin-top:30px;
}
.timer{
  font-weight:600;
  color:red;
}
</style>
</head>
<body>

<header>
<h1>Günlük İlginç Bilgi Oyunu</h1>
</header>

<main>

<div id="login">
<p>Oyuna başlamak için giriş yap:</p>
<button id="google-login">Google ile Giriş</button>
</div>

<div id="game" style="display:none;">
<h2 id="question"></h2>
<div class="timer">Süre: <span id="time">10</span></div>
<div id="answers"></div>
<p><strong>Puan:</strong> <span id="score">0</span></p>
</div>

<div id="leaderboard">
<h3>🏆 Aylık Leaderboard</h3>
<ol id="lb-list"></ol>
</div>

</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs, orderBy, limit, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser=null;
let questions=[];
let questionIndex=0;
let score=0;
let timerInterval=null;
let timeLeft=10;

const loginDiv=document.getElementById("login");
const gameDiv=document.getElementById("game");
const questionEl=document.getElementById("question");
const answersEl=document.getElementById("answers");
const scoreEl=document.getElementById("score");
const lbList=document.getElementById("lb-list");
const timeEl=document.getElementById("time");

function getCurrentMonthId(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

async function loadQuestions(){
  const todayStr=new Date().toISOString().split('T')[0];
  const qSnap=query(collection(db,"dailyInfos"), where("date","==",todayStr));
  const snapshot=await getDocs(qSnap);
  questions=snapshot.docs.map(doc=>doc.data()).sort(()=>Math.random()-0.5);
}

function startTimer(){
  timeLeft=10;
  timeEl.textContent=timeLeft;
  timerInterval=setInterval(()=>{
    timeLeft--;
    timeEl.textContent=timeLeft;
    if(timeLeft<=0){
      clearInterval(timerInterval);
      questionIndex++;
      showQuestion();
    }
  },1000);
}

function showQuestion(){
  if(questionIndex>=5 || questionIndex>=questions.length){
    finishGame();
    return;
  }

  const q=questions[questionIndex];
  questionEl.textContent=q.title;

  const options=[q.detail];
  while(options.length<4){
    const rand=questions[Math.floor(Math.random()*questions.length)].detail;
    if(!options.includes(rand)) options.push(rand);
  }
  options.sort(()=>Math.random()-0.5);

  answersEl.innerHTML="";
  options.forEach(opt=>{
    const btn=document.createElement("button");
    btn.textContent=opt;
    btn.onclick=()=>{
      clearInterval(timerInterval);
      if(opt===q.detail){
        score+=20;
        scoreEl.textContent=score;
      }
      questionIndex++;
      showQuestion();
    };
    answersEl.appendChild(btn);
  });

  startTimer();
}

async function finishGame(){
  if(!currentUser) return;

  const monthId=getCurrentMonthId();
  const scoreRef=doc(db,"monthlyScores",monthId,"players",currentUser.uid);

  const existing=await getDoc(scoreRef);

  if(!existing.exists() || existing.data().score<score){
    await setDoc(scoreRef,{
      name:currentUser.displayName,
      score:score,
      updatedAt:serverTimestamp()
    });
  }

  updateLeaderboard();
}

async function updateLeaderboard(){
  const monthId=getCurrentMonthId();
  const lbQ=query(
    collection(db,"monthlyScores",monthId,"players"),
    orderBy("score","desc"),
    limit(10)
  );
  const snapshot=await getDocs(lbQ);
  lbList.innerHTML="";
  snapshot.forEach(doc=>{
    const li=document.createElement("li");
    li.textContent=`${doc.data().name}: ${doc.data().score}`;
    lbList.appendChild(li);
  });
}

document.getElementById("google-login").onclick=async()=>{
  const provider=new GoogleAuthProvider();
  const result=await signInWithPopup(auth,provider);
  currentUser=result.user;
  loginDiv.style.display="none";
  gameDiv.style.display="block";
  await loadQuestions();
  showQuestion();
};

updateLeaderboard();

</script>
</body>
</html>
